name: iOS Build

on:
  push:
    branches: ['**']
    paths:
      - 'mobile/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Patch real_page_flip (CoreHaptics API)
        run: bash scripts/patch-real-page-flip.sh

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Run widget tests
        run: flutter test

      - name: Device run notes
        run: |
          echo "Real iPhone: mobile/scripts/run-on-iphone.sh <device-id>"
          echo "Journal haptics + page sound active on iOS (real_page_flip)"

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: mobile/build/ios/iphoneos/*.app
