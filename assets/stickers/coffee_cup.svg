<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="cupBody" cx="35%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#8A6B4E"/>
      <stop offset="60%" stop-color="#6F4E37"/>
      <stop offset="100%" stop-color="#4E3524"/>
    </radialGradient>
    <linearGradient id="steamGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#8FA898" stop-opacity="0"/>
      <stop offset="100%" stop-color="#C7DBCF" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.25"/>
