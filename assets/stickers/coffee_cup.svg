    <path d="M -20 -55 C -28 -70, -12 -78, -16 -95 C -7 -87, 8 -83, 1 -68 C -3 -60, -12 -60, -20 -55 Z"
          fill="url(#steamGrad)" stroke="#7C9A8B" stroke-width="3" stroke-linejoin="round"/>
    <path d="M 14 -52 C 6 -68, 22 -76, 18 -93 C 27 -85, 42 -80, 34 -65 C 30 -57, 21 -57, 14 -52 Z"
          fill="url(#steamGrad)" stroke="#7C9A8B" stroke-width="3" stroke-linejoin="round"/>
