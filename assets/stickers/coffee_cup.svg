  </defs>

  <!-- die-cut white sticker border -->
  <circle cx="100" cy="100" r="94" fill="#FFFFFF" filter="url(#dropShadow)"/>
  <circle cx="100" cy="100" r="94" fill="none" stroke="#FFFFFF" stroke-width="10"/>
  <circle cx="100" cy="100" r="88" fill="#FBF6EA"/>

  <g transform="translate(100,112)">
    <path d="M -60 5 C -60 50, -30 82, 0 82 C 30 82, 60 50, 60 5 L 60 -30 L -60 -30 Z"
          fill="url(#cupBody)" stroke="#2A1B10" stroke-width="6" stroke-linejoin="round"/>
    <ellipse cx="-18" cy="-8" rx="14" ry="26" fill="#FFFFFF" opacity="0.18"/>
    <rect x="-68" y="-44" width="136" height="18" rx="9" fill="#4A3324" stroke="#2A1B10" stroke-width="6"/>
    <path d="M 58 -20 C 85 -20, 98 -5, 98 8 C 98 22, 85 33, 65 33 L 65 12 C 76 12, 80 8, 80 2 C 80 -4, 76 -8, 58 -8 Z"
