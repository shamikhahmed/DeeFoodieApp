<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3E7D3"/>
      <stop offset="100%" stop-color="#E8DCC0"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9FBBB0"/>
      <stop offset="100%" stop-color="#7FA898"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- distant generic skyline silhouette -->
  <g fill="#C9BBA0" opacity="0.6">
    <rect x="60" y="480" width="70" height="220"/>
    <rect x="150" y="430" width="50" height="270"/>
    <rect x="900" y="440" width="60" height="260"/>
    <rect x="980" y="400" width="45" height="300"/>
    <rect x="1350" y="460" width="70" height="240"/>
    <rect x="1450" y="420" width="50" height="280"/>
  </g>

  <!-- Mazar-e-Quaid -->
  <g transform="translate(300,560)">
    <path d="M -110 140 L 110 140 L 110 40 L -110 40 Z" fill="#FBF6EA" stroke="#2A1B10" stroke-width="10"/>
    <path d="M -75 40 L -75 -30 L 75 -30 L 75 40 Z" fill="#F3E7D3" stroke="#2A1B10" stroke-width="10"/>
    <path d="M -85 -30 Q 0 -150, 85 -30 Z" fill="#8FA898" stroke="#2A1B10" stroke-width="10" stroke-linejoin="round"/>
    <circle cx="0" cy="-145" r="10" fill="#D9A24A" stroke="#2A1B10" stroke-width="7"/>
    <rect x="-14" y="70" width="28" height="70" fill="#2A1B10" opacity="0.5"/>
  </g>

  <!-- Frere Hall -->
  <g transform="translate(750,600)">
    <rect x="-90" y="20" width="180" height="90" fill="#F0C892" stroke="#2A1B10" stroke-width="9"/>
    <path d="M -105 20 L 0 -55 L 105 20 Z" fill="#B5432D" stroke="#2A1B10" stroke-width="9" stroke-linejoin="round"/>
    <rect x="-65" y="40" width="26" height="65" fill="#2A1B10" opacity="0.3"/>
    <rect x="-13" y="40" width="26" height="65" fill="#2A1B10" opacity="0.3"/>
    <rect x="39" y="40" width="26" height="65" fill="#2A1B10" opacity="0.3"/>
  </g>

  <!-- dhow boats on the water -->
  <g transform="translate(1150,660)">
    <path d="M -70 20 Q 0 55, 70 20 L 55 45 Q 0 65, -55 45 Z" fill="#6F4E37" stroke="#2A1B10" stroke-width="9" stroke-linejoin="round"/>
    <path d="M 0 20 L 0 -60 L 45 -10 Z" fill="#F0C892" stroke="#2A1B10" stroke-width="8" stroke-linejoin="round"/>
    <path d="M 0 20 L 0 -60" stroke="#2A1B10" stroke-width="8"/>
  </g>
  <g transform="translate(1300,700) scale(0.7)">
    <path d="M -70 20 Q 0 55, 70 20 L 55 45 Q 0 65, -55 45 Z" fill="#8B6749" stroke="#2A1B10" stroke-width="9" stroke-linejoin="round"/>
    <path d="M 0 20 L 0 -60 L 45 -10 Z" fill="#FBF6EA" stroke="#2A1B10" stroke-width="8" stroke-linejoin="round"/>
    <path d="M 0 20 L 0 -60" stroke="#2A1B10" stroke-width="8"/>
  </g>

  <!-- sea foreground with wave lines -->
  <path d="M 0 760 L 1600 760 L 1600 900 L 0 900 Z" fill="url(#sea)"/>
  <path d="M 0 780 Q 200 765, 400 780 T 800 780 T 1200 780 T 1600 780" fill="none" stroke="#FBF6EA" stroke-width="6" opacity="0.5" stroke-linecap="round"/>
  <path d="M 0 820 Q 200 805, 400 820 T 800 820 T 1200 820 T 1600 820" fill="none" stroke="#FBF6EA" stroke-width="6" opacity="0.4" stroke-linecap="round"/>

  <!-- gulls -->
  <g stroke="#2A1B10" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.6">
    <path d="M 500 150 Q 515 135, 530 150"/>
    <path d="M 540 165 Q 555 150, 570 165"/>
    <path d="M 1100 120 Q 1115 105, 1130 120"/>
  </g>
</svg>
